<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wi-Fi Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 0.95rem;
        }

        .content {
            padding: 30px 20px;
        }

        .section {
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
        }

        .section-title::before {
            content: '📶';
            margin-right: 10px;
            font-size: 1.3rem;
        }

        .wifi-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .wifi-item {
            background: #f8f9ff;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .wifi-item:hover {
            background: #e3f2fd;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .wifi-item.selected {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border-color: #4facfe;
        }

        .wifi-signal {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
        }

        .wifi-name {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .password-section {
            background: #f8f9ff;
            border-radius: 15px;
            padding: 25px;
            border: 2px dashed #e0e0e0;
            display: none;
        }

        .password-section.active {
            display: block;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .password-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
        }

        .password-title::before {
            content: '🔐';
            margin-right: 10px;
            font-size: 1.3rem;
        }

        .password-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .password-item {
            background: white;
            padding: 15px 20px;
            border-radius: 12px;
            border-left: 4px solid #4facfe;
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            word-break: break-all;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .password-item:hover {
            background: #e3f2fd;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .copy-btn {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 5px 12px;
            cursor: pointer;
            font-size: 0.85rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .password-item:hover .copy-btn {
            opacity: 1;
        }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(79, 172, 254, 0.4);
        }

        .no-selection {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 40px 20px;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
                border-radius: 15px;
            }
            
            .header h1 {
                font-size: 1.5rem;
            }
            
            .content {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Wi-Fi Scanner</h1>
            <p>Pilih jaringan Wi-Fi untuk melihat kemungkinan password</p>
        </div>
        
        <div class="content">
            <div class="section">
                <h2 class="section-title">Jaringan Tersedia</h2>
                <div class="wifi-list" id="wifiList">
                    <!-- WiFi items akan di-generate oleh JavaScript -->
                </div>
            </div>
            
            <div class="section">
                <div class="password-section" id="passwordSection">
                    <h3 class="password-title">Kemungkinan Password</h3>
                    <div class="password-list" id="passwordList">
                        <!-- Password items akan di-generate oleh JavaScript -->
                    </div>
                    <button class="generate-btn" onclick="generatePasswords()">
                        🔄 Generate Password Baru
                    </button>
                </div>
                
                <div class="no-selection" id="noSelection">
                    <p>Pilih salah satu jaringan Wi-Fi di atas</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Data WiFi dummy
        const wifiNetworks = [
            { name: "RumahKita", signal: "📶📶📶📵", strength: 85 },
            { name: "IndiHome-Wifi", signal: "📶📶📶📶", strength: 95 },
            { name: "TelkomselOrbit", signal: "📶📶📵📵", strength: 45 },
            { name: "KopiCorner_Free", signal: "📶📶📶📵", strength: 70 },
            { name: "MYWiFi_2G", signal: "📶📶📵📵", strength: 55 },
            { name: "BiznetHome", signal: "📶📶📶📶", strength: 90 }
        ];

        let selectedNetwork = null;
        let currentPasswords = [];

        // Generate WiFi list
        function renderWifiList() {
            const wifiList = document.getElementById('wifiList');
            wifiList.innerHTML = wifiNetworks.map(network => `
                <div class="wifi-item ${selectedNetwork === network.name ? 'selected' : ''}" 
                     onclick="selectNetwork('${network.name}')">
                    <div class="wifi-name">${network.name}</div>
                    <div class="wifi-signal">${network.signal}</div>
                </div>
            `).join('');
        }

        // Select network
        function selectNetwork(networkName) {
            selectedNetwork = networkName;
            renderWifiList();
            
            document.getElementById('passwordSection').classList.add('active');
            document.getElementById('noSelection').style.display = 'none';
            
            generatePasswords();
        }

        // Generate random passwords
        function generatePasswords() {
            currentPasswords = [];
            const passwordList = document.getElementById('passwordList');
            
            for (let i = 0; i < 5; i++) {
                currentPasswords.push(generateRandomPassword());
            }
            
            passwordList.innerHTML = currentPasswords.map((password, index) => `
                <div class="password-item">
                    ${password}
                    <button class="copy-btn" onclick="copyPassword('${password}')">📋 Copy</button>
                </div>
            `).join('');
        }

        // Generate realistic-looking password
        function generateRandomPassword() {
            const patterns = [
                // Common patterns
                () => Math.floor(Math.random() * 10000) + '',
                () => 'password' + Math.floor(Math.random() * 100),
                () => 'wifi' + Math.floor(Math.random() * 1000),
                () => Math.floor(Math.random() * 100000000) + '',
                () => Array.from({length: 8}, () => Math.floor(Math.random() * 10)).join(''),
                () => selectedNetwork.replace(/[^a-zA-Z]/g, '').toLowerCase() + Math.floor(Math.random() * 100),
                () => '12345678'.split('').sort(() => Math.random() - 0.5).join(''),
                () => Array.from({length: 10}, () => String.fromCharCode(97 + Math.floor(Math.random() * 26))).join('')
            ];
            
            return patterns[Math.floor(Math.random() * patterns.length)]();
        }

        // Copy password to clipboard
        function copyPassword(password) {
            navigator.clipboard.writeText(password).then(() => {
                // Visual feedback
                const btn = event.target;
                const originalText = btn.textContent;
                btn.textContent = '✅ Copied!';
                btn.style.background = '#10b981';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '#4facfe';
                }, 1500);
            });
        }

        // Initialize app
        document.addEventListener('DOMContentLoaded', () => {
            renderWifiList();
        });
    </script>
</body>
</html>
